services:
  db:
    image: postgres:15-alpine
    container_name: carrental-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carrental
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  service-b:
    build: ./service-b
    container_name: service-b
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: carrental
    ports:
      - "50051:50051"

  service-a:
    build: ./service-a
    container_name: service-a
    depends_on:
      - service-b
    environment:
      SERVICE_B_URL: service-b:50051
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - service-a
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "8080:80"
